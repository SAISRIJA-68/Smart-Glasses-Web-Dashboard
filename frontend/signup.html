<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Smart Glasses Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:420px">
    <div class="auth-logo">
      <div class="auth-logo-icon">🕶️</div>
      <div class="auth-logo-text"><span>SMART GLASSES</span>DASHBOARD v2.0</div>
    </div>

    <h2 class="auth-title">CREATE ACCOUNT</h2>
    <p class="auth-subtitle">Join the network — your data, your feed</p>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" placeholder="your_callsign" required autocomplete="username" minlength="3">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" placeholder="user@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
        <div class="form-hint">Use at least 8 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" required autocomplete="new-password">
      </div>

      <div id="signup-error" style="display:none; color:var(--red); font-size:0.8rem; margin-bottom:0.75rem; background:var(--red-glow); padding:0.5rem 0.75rem; border-radius:var(--radius); border-left:3px solid var(--red);"></div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center" id="btn-signup">
        <span>CREATE ACCOUNT</span>
      </button>
    </form>

    <div class="divider"><span>ALREADY HAVE AN ACCOUNT</span></div>

    <a href="/login.html" class="btn btn-ghost" style="width:100%; justify-content:center; display:flex;">
      ← Sign In
    </a>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/';
  Theme.init();

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-signup');
    const errEl = document.getElementById('signup-error');
    errEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    try {
      const data = await API.signup({ username, email, password });
      Auth.setAuth(data.token, data.user);
      Toast.success('Account created! Welcome, ' + data.user.username);
      setTimeout(() => window.location.href = '/', 600);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<span>CREATE ACCOUNT</span>';
    }
  });
</script>
</body>
</html>
